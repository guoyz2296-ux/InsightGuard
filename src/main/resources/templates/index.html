<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightGuard | PTSD 实时监测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chart-container { height: 400px; width: 100%; }
        .data-card { transition: all 0.3s; border: none; border-radius: 15px; }
        .data-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .value-large { font-size: 3rem; font-weight: 800; line-height: 1; }
        .status-indicator { width: 15px; height: 15px; border-radius: 50%; display: inline-block; }
        .bg-pulse-red { background-color: #ff4d4f; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div id="app" class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <div>
            <h2 class="fw-bold text-dark m-0">InsightGuard <span class="fs-6 fw-normal text-secondary">| 实时生理反馈终端</span></h2>
        </div>
        <div class="badge bg-white text-dark shadow-sm p-2 px-3 border">
            <span class="status-indicator me-2" :class="healthData.status === 1 ? 'bg-pulse-red' : 'bg-success'"></span>
            系统连接状态: {{ healthData.status === 1 ? '高危预警' : '正在监测' }}
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="row g-3">
                <div class="col-12">
                    <div class="card data-card shadow-sm p-4">
                        <h6 class="text-secondary text-uppercase fw-bold">实时心率 (BPM)</h6>
                        <div class="d-flex align-items-baseline mt-2">
                            <span class="value-large" :class="healthData.status === 1 ? 'text-danger' : 'text-primary'">{{ healthData.heartRate }}</span>
                            <span class="ms-2 text-secondary">/ min</span>
                        </div>
                        <div class="progress mt-3" style="height: 6px;">
                            <div class="progress-bar" role="progressbar" :style="{width: (healthData.heartRate/180*100)+'%'}"></div>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="card data-card shadow-sm p-4">
                        <h6 class="text-secondary text-uppercase fw-bold">呼吸频率</h6>
                        <div class="d-flex align-items-baseline mt-2">
                            <span class="value-large text-info">{{ healthData.breathRate }}</span>
                            <span class="ms-2 text-secondary">次/min</span>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="card bg-dark text-white shadow-sm p-4" style="border-radius: 15px;">
                        <h6>数据日志</h6>
                        <p class="small mb-1">最后更新: {{ healthData.recordTime }}</p>
                        <p class="small mb-0 text-secondary">采样频率: 1Hz (1次/秒)</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card data-card shadow-sm h-100 p-3">
                <h6 class="text-secondary text-uppercase fw-bold mb-3 px-2">生理指标实时趋势图</h6>
                <div id="mainChart" class="chart-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const healthData = ref({ heartRate: 0, breathRate: 0, status: 0, recordTime: '--' });
            let myChart = null;
            const heartRateHistory = []; // 存储最近30秒心率数据
            const timeHistory = [];      // 存储时间标签

            // 1. 初始化 ECharts
            const initChart = () => {
                const chartDom = document.getElementById('mainChart');
                myChart = echarts.init(chartDom);
                const option = {
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: timeHistory, boundaryGap: false },
                    yAxis: { type: 'value', min: 40, max: 150 },
                    series: [{
                        name: '心率',
                        type: 'line',
                        smooth: true,
                        data: heartRateHistory,
                        areaStyle: { opacity: 0.1 },
                        itemStyle: { color: '#0d6efd' },
                        lineStyle: { width: 3 }
                    }]
                };
                myChart.setOption(option);
            };

            // 2. 获取数据并更新
            const fetchData = () => {
                axios.get('http://localhost:8080/api/health/latest')
                    .then(res => {
                        if (res.data.length > 0) {
                            const latest = res.data[0];
                            healthData.value = latest;

                            // 更新图表数据流
                            const now = new Date().toLocaleTimeString();
                            if (timeHistory.length > 30) {
                                timeHistory.shift();
                                heartRateHistory.shift();
                            }
                            timeHistory.push(now);
                            heartRateHistory.push(latest.heartRate);

                            // 刷新图表
                            myChart.setOption({
                                xAxis: { data: timeHistory },
                                series: [{ data: heartRateHistory }]
                            });
                        }
                    });
            };

            onMounted(() => {
                initChart();
                fetchData();
                setInterval(fetchData, 1000); // 每一秒跑一次 Ajax
                window.onresize = () => myChart.resize(); // 窗口缩放适配
            });

            return { healthData };
        }
    }).mount('#app');
</script>
</body>
</html>
